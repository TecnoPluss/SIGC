<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoPlus | SIGC</title>
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f7f6; font-family: sans-serif; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe {
            position: absolute;
            /* Ocultamos la franja de Google */
            top: -45px; 
            left: 0;
            width: 100%;
            height: calc(100% + 45px);
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png" width="120" style="margin-bottom: 20px;">
        <div class="spinner"></div>
        <p id="msg">Iniciando TecnoPlus SIGC...</p>
    </div>

    <iframe id="app_frame" src="" allow="geolocation; microphone; camera; clipboard-write;"></iframe>

    <script>
        async function bootstrap() {
            // 1. LINK DE TU CSV (El mismo que usaste en Odoo)
            const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMXgT2SYdDz2xBBUDP5eJ2gqMmee6qAQRk73xWMpZIyZ8jSdUucxVcnCIChlqGDKEutyej1CGps1k9/pub?gid=0&single=true&output=csv";
            
            const params = new URLSearchParams(window.location.search);
            const clienteID = params.get('c');

            if (!clienteID) {
                document.getElementById('msg').innerHTML = "<b style='color:red;'>Error: ID de cliente faltante.</b>";
                document.querySelector('.spinner').style.display = "none";
                return;
            }

            try {
                // El Date.now evita que el navegador guarde una versión vieja del Excel
                const response = await fetch(CSV_URL + "&t=" + Date.now());
                const text = await response.text();
                const rows = text.split('\n');

                let urlFinal = "";
                let estado = "";

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols[0] && cols[0].trim().toUpperCase() === clienteID.toUpperCase()) {
                        estado = cols[5].trim().toUpperCase(); // Columna F
                        urlFinal = cols[6].trim();            // Columna G
                        break;
                    }
                }

                if (estado === "ACTIVA" && urlFinal) {
                    const frame = document.getElementById('app_frame');
                    frame.src = urlFinal;
                    frame.onload = () => {
                        frame.style.display = "block";
                        document.getElementById('loader').style.display = "none";
                    };
                } else {
                    document.getElementById('msg').innerHTML = "<b style='color:red;'>Acceso Denegado o Cliente No Registrado.</b>";
                    document.querySelector('.spinner').style.display = "none";
                }
            } catch (e) {
                document.getElementById('msg').innerHTML = "Error de conexión.";
            }
        }

        bootstrap();
    </script>
</body>
</html>
