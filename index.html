<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=0.4, user-scalable=yes">
    <title>TecnoPlus | SIGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png">
    
    <style>
        :root {
            --primary: #004687;
            --accent: #00a8e8;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
        }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999;
            background: var(--bg-gradient);
        }

        .loader-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px 60px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }

        .logo {
            width: 130px; margin-bottom: 25px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .progress-container {
            width: 200px; height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            animation: load 3s ease-in-out forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        #msg {
            color: #444; font-size: 14px; font-weight: 500;
            margin: 0; letter-spacing: 0.5px;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100%);
            border: none;
            display: none;
        }

        /* Contenedor oculto donde se inyecta el ticket para imprimir en Windows */
        #print-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 99999;
            background: white;
        }

        @media print {
            #loader, iframe { display: none !important; }
            #print-container { display: block !important; }
        }

        .error-msg { color: #d32f2f; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png" class="logo">
            <p id="msg">Iniciando TecnoPlus SIGC...</p>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <iframe id="app_frame" src="" allow="geolocation; microphone; camera; clipboard-write;"></iframe>

    <!-- Contenedor para impresión en Windows (invisible hasta imprimir) -->
    <div id="print-container"></div>

    <script>
    async function bootstrap() {
        const params = new URLSearchParams(window.location.search);
        const clienteID = params.get('c');

        if (!clienteID) {
            document.getElementById('msg').innerHTML = "<span style='color:red;'>ID de cliente faltante.</span>";
            return;
        }

        try {
            const response = await fetch('config.json?v=' + Date.now());
            const config = await response.json();
            const cliente = config[clienteID.toUpperCase()];

            if (cliente && cliente.s === "ACTIVA") {
                const frame = document.getElementById('app_frame');
                frame.src = cliente.u;
                frame.onload = () => {
                    setTimeout(() => {
                        frame.style.display = "block";
                        document.getElementById('loader').style.opacity = "0";
                        setTimeout(() => document.getElementById('loader').style.display = "none", 500);
                    }, 500);
                };
            } else if (cliente && cliente.s === "INACTIVA") {
                document.getElementById('msg').innerHTML = "<span style='color:red;'>Suscripción Suspendida.</span>";
            } else {
                document.getElementById('msg').innerHTML = "<span style='color:red;'>Cliente no registrado.</span>";
            }
        } catch (e) {
            document.getElementById('msg').innerHTML = "Error de Sistema.";
        }
    }

    bootstrap();
        
    // ESCUCHADOR DE ÓRDENES DESDE EL POS (IFRAME)
    window.addEventListener("message", function(event) {
        if (event.data && event.data.tipo === 'COMANDO_IMPRIMIR_APK') {
            console.log("Recibida orden de impresión del POS...");

            var htmlTicket = event.data.ticket;

            // ★ CASO WINDOWS (.exe con WebView2)
            // Inyectamos el ticket en el div oculto y llamamos window.print()
            // Esto evita window.open() que es bloqueado por WebView2 cross-origin
            if (window.chrome && window.chrome.webview) {
                var container = document.getElementById('print-container');
                container.innerHTML = htmlTicket;
                window.print();
                // Limpiar después de imprimir
                setTimeout(function() {
                    container.innerHTML = '';
                }, 2000);
                return; // No ejecutar el bloque de Android
            }

            // CASO ANDROID (comportamiento original sin ningún cambio)
            var bodyOriginal = document.body.innerHTML;
            document.body.innerHTML = htmlTicket;

            if (typeof AndroidImpresora !== "undefined") {
                AndroidImpresora.ejecutarImpresion();
            }

            setTimeout(() => {
                location.reload(); 
            }, 3000);
        }
    });
        
    </script>
</body>
</html>
