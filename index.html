<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- MODIFICACIÓN: Viewport ajustado a 1024 para alejar el zoom en móviles y permitir scroll -->
    <meta name="viewport" content="width=1024, initial-scale=1.0, user-scalable=yes">
    <title>TecnoPlus | SIGC</title>
    
    <!-- MODIFICACIÓN: Soporte para instalación en iPhone y Android (PWA) -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TecnoPlus">
    <link rel="apple-touch-icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png">

    <!-- Fuente Inter - La más profesional para Software -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png">
    
    <style>
        :root {
            --primary: #004687;
            --accent: #00a8e8;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
        }
        
        /* Contenedor de Carga Estilo Moderno */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999;
            background: var(--bg-gradient);
            transition: opacity 0.5s ease; /* Suavizado al desaparecer */
        }

        .loader-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px 60px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }

        .logo {
            width: 130px; margin-bottom: 25px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Barra de progreso elegante */
        .progress-container {
            width: 200px; height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            animation: load 3s ease-in-out forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        #msg {
            color: #444; font-size: 14px; font-weight: 500;
            margin: 0; letter-spacing: 0.5px;
        }

        /* Iframe con compensación para ocultar franja de Google */
        iframe {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .error-msg { color: #d32f2f; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <!-- MODIFICACIÓN: Se añade id="main_logo" para hacerlo dinámico -->
            <img id="main_logo" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgN-_QvsMG51PzykustQRLBBmxyXzSE-ouzmSovei9czEj9MNhKOkWYrXxWhIbisAz_j837hHT25IK8IwB86SZfVQIEK_hrnyLcBXTQz07YkEyoCfRuW38KQgKwgB7BuLXdGL2gqTwiukZJRtp0cQQ6sursFkVlPi_RCTpRgQQ8XRrKlnOk1sHEcoSoiBU/s320/ssss-removebg-preview.png" class="logo">
            
            <p id="msg">Iniciando TecnoPlus SIGC...</p>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <iframe id="app_frame" src="" allow="geolocation; microphone; camera; clipboard-write;"></iframe>

    <script>
    // MODIFICACIÓN: Registro de Service Worker para PWA (iOS/Android)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // MODIFICACIÓN: Puente para recibir ventas del computador (Offline Sync)
    function recibirVentaDesdeEXE(datosVenta) {
        const frame = document.getElementById('app_frame');
        if (frame.contentWindow) {
            frame.contentWindow.postMessage({
                tipo: 'SYNC_OFFLINE_SALE',
                data: datosVenta
            }, '*');
        }
    }

    async function bootstrap() {
        // Obtenemos el cliente de la URL (?c=Pruebas)
        const params = new URLSearchParams(window.location.search);
        const clienteID = params.get('c');

        if (!clienteID) {
            document.getElementById('msg').innerHTML = "<span style='color:red;'>ID de cliente faltante.</span>";
            return;
        }

        try {
            // CARGA ULTRA RÁPIDA: Leemos el archivo JSON local
            const response = await fetch('config.json?v=' + Date.now());
            const config = await response.json();

            // MODIFICACIÓN: Aplicar Logo Dinámico Global si existe en el JSON
            if (config._CONFIG_GLOBAL_ && config._CONFIG_GLOBAL_.logo) {
                document.getElementById('main_logo').src = config._CONFIG_GLOBAL_.logo;
            }

            const cliente = config[clienteID.toUpperCase()];

            if (cliente && cliente.s === "ACTIVA") {
                const frame = document.getElementById('app_frame');
                frame.src = cliente.u; // Cargamos la URL del /exec
                frame.onload = () => {
                    setTimeout(() => {
                        frame.style.display = "block";
                        document.getElementById('loader').style.opacity = "0";
                        setTimeout(() => document.getElementById('loader').style.display = "none", 500);
                    }, 500);
                };
            } else if (cliente && cliente.s === "INACTIVA") {
                document.getElementById('msg').innerHTML = "<span style='color:red;'>Suscripción Suspendida.</span>";
            } else {
                document.getElementById('msg').innerHTML = "<span style='color:red;'>Cliente no registrado.</span>";
            }
        } catch (e) {
            document.getElementById('msg').innerHTML = "Error de Sistema.";
        }
    }

    bootstrap();
</script>
</body>
</html>
